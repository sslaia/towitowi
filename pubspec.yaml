name: towitowi
description: "A simple note taking app in the age of AI."
publish_to: 'none'
version: 0.1.1+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.1.0
  provider: ^6.1.5+1
  sqflite: ^2.3.3
  path: ^1.9.0
  easy_localization: ^3.0.8
  flutter_markdown_plus: ^1.0.6
  flutter_tts: ^4.2.5
  share_plus: ^10.0.2
  shared_preferences: ^2.5.5
  google_genai: ^0.0.1+1
  google_generative_ai: ^0.4.7
  flutter_secure_storage: ^10.3.1
  flutter_svg: ^2.3.0
  file_picker: ^8.0.0
  path_provider: ^2.1.6
  archive: ^4.0.9
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/icon/
    - assets/images/
